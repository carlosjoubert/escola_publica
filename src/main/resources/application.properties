spring.application.name=geo

# ==========================================
# Configurações de Conexão com o Banco
# ==========================================
# Substitua 'meubanco' pelo nome do seu banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/db_ensinomedio?createDatabaseIfNotExist=true&serverTimezone=UTC

# Usuário e senha do seu MySQL (o padrão do XAMPP/WAMP geralmente é root e senha vazia)
spring.datasource.username=root
spring.datasource.password=1358

# Driver moderno do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# Configurações do Hibernate / JPA
# ==========================================
# O que o Spring deve fazer com as tabelas?
# 'update': cria as tabelas se não existirem e atualiza se você mudar a classe
# 'create-drop': cria quando roda e apaga quando desliga (bom pra testes)
spring.jpa.hibernate.ddl-auto=update

# Mostra no console os comandos SQL que o Spring está executando por baixo dos panos
spring.jpa.show-sql=true

# Formata o SQL no console para ficar mais legível
spring.jpa.properties.hibernate.format_sql=true